<section class="section" data-section-id="what_is_3d_anatomy">
    <div class="section-container">
        <div class="section-header">
            <span class="section-badge">INTRODUCTION</span>
            <h2 class="section-title">3D 해부학이란?</h2>
        </div>

        <div class="content-area">
            <div class="split-layout">
                <div class="split-left">
                    <svg viewBox="0 0 400 360" class="agent-illustration">
                        <!-- Human body outline -->
                        <ellipse cx="200" cy="60" rx="35" ry="40" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.5"/>
                        <circle cx="200" cy="55" r="8" fill="#2563eb" opacity="0.2"/>

                        <!-- Torso -->
                        <path d="M165 95 L165 200 Q165 220 185 230 L215 230 Q235 220 235 200 L235 95" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.4"/>

                        <!-- Skeleton lines -->
                        <line x1="200" y1="100" x2="200" y2="220" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
                        <line x1="170" y1="120" x2="230" y2="120" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
                        <line x1="175" y1="160" x2="225" y2="160" stroke="#2563eb" stroke-width="1" opacity="0.2"/>
                        <line x1="180" y1="180" x2="220" y2="180" stroke="#2563eb" stroke-width="1" opacity="0.2"/>

                        <!-- Legs -->
                        <line x1="185" y1="230" x2="175" y2="320" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
                        <line x1="215" y1="230" x2="225" y2="320" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>

                        <!-- Arms -->
                        <line x1="165" y1="105" x2="120" y2="200" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
                        <line x1="235" y1="105" x2="280" y2="200" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>

                        <!-- Organ highlights -->
                        <ellipse cx="190" cy="140" rx="15" ry="18" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="1"/>
                        <ellipse cx="210" cy="145" rx="12" ry="15" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="1"/>
                        <circle cx="200" cy="175" r="10" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="1"/>

                        <!-- 3D rotation indicators -->
                        <ellipse cx="200" cy="160" rx="80" ry="30" fill="none" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.2"/>
                        <path d="M280 160 Q290 145 275 135" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
                        <polygon points="277,131 271,139 279,139" fill="#2563eb" opacity="0.3"/>

                        <!-- Labels -->
                        <text x="100" y="140" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">MUSCLE</text>
                        <text x="300" y="145" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">BONE</text>
                        <text x="200" y="350" text-anchor="middle" fill="#2563eb" font-size="10" opacity="0.5" font-weight="600">INTERACTIVE 3D MODEL</text>
                    </svg>
                </div>
                <div class="split-right">
                    <div class="concept-block">
                        <h3 class="concept-title">인체를 3D로 탐구하는 새로운 방식</h3>
                        <p class="concept-text">
                            3D 해부학은 전통적인 2D 교과서를 넘어,
                            <strong>실시간 3D 모델로 인체 구조를 360도 회전하며 학습</strong>하는
                            차세대 해부학 교육 방법입니다.
                        </p>
                    </div>
                    <div class="concept-list">
                        <div class="concept-item">
                            <span class="concept-num">01</span>
                            <div>
                                <strong>3D 시각화</strong>
                                <p>근육, 골격, 장기를 레이어별로 분리하여 입체적으로 관찰</p>
                            </div>
                        </div>
                        <div class="concept-item">
                            <span class="concept-num">02</span>
                            <div>
                                <strong>인터랙티브 학습</strong>
                                <p>클릭, 회전, 확대로 원하는 부위를 자유롭게 탐색</p>
                            </div>
                        </div>
                        <div class="concept-item">
                            <span class="concept-num">03</span>
                            <div>
                                <strong>AI 기반 생성</strong>
                                <p>AI 도구를 활용한 해부학 일러스트 및 3D 모델 제작</p>
                            </div>
                        </div>
                        <div class="concept-item">
                            <span class="concept-num">04</span>
                            <div>
                                <strong>실무 활용</strong>
                                <p>의료, 교육, 게임, 피트니스 등 다양한 산업에서 활용 가능</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
